{% extends "base.html" %}

{% block title %}Login - Smart Study Hub{% endblock %}

{% block content %}
<section class="auth-section">
    
    <div class="bg-shape shape-top-left"></div>
    <div class="bg-shape shape-bottom-right"></div>

    <div class="container auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to access your study materials.</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="student@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Create one here</a></p>
            </div>

        </div>
    </div>
</section>
{% endblock %}
