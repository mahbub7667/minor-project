{% extends "base.html" %}

{% block title %}Register - Smart Study Hub{% endblock %}

{% block content %}
<section class="auth-section">
    
    <div class="bg-shape shape-top-left"></div>
    <div class="bg-shape shape-bottom-right"></div>

    <div class="container auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join Smart Study Hub to access premium resources.</p>
            </div>

            <form action="#" method="POST" class="auth-form">
                
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" name="full_name" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="student@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="#">Log in here</a></p>
            </div>

        </div>
    </div>
</section>
{% endblock %}
