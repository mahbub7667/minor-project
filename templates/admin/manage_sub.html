{% extends "base.html" %}

{% block title %}Manage Subjects - Admin{% endblock %}

{% block content %}
<div class="container" style="margin-top: 50px;">
    <h2>Manage Subjects</h2>
    
    <div class="auth-card" style="margin-bottom: 30px; padding: 20px;">
        <form action="{{ url_for('manage_subjects') }}" method="POST">
            <div class="form-group">
                <input type="text" name="subject_name" placeholder="Subject Name (e.g., Data Structures)" required>
            </div>
            <div class="form-group">
                <input type="text" name="subject_code" placeholder="Subject Code (e.g., CS402)" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Subject</button>
        </form>
    </div>

    <table class="table" border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background-color: #f4f4f4;">
                <th style="padding: 10px;">Code</th>
                <th style="padding: 10px;">Subject Name</th>
            </tr>
        </thead>
        <tbody>
            {% for sub in subjects %}
            <tr>
                <td style="padding: 10px;">{{ sub.subject_code }}</td>
                <td style="padding: 10px;">{{ sub.subject_name }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2" style="padding: 10px; text-align: center;">No subjects added yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
