{% extends "base.html" %}

{% block title %}Upload Resources - Admin{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-dash.css') }}">
{% endblock %}

{% block content %}
<div class="container" style="margin-top: 40px; max-width: 600px;">
    <h2><i class="fa-solid fa-upload"></i> Upload Resource</h2>

    <div class="auth-card" style="padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <form action="{{ url_for('upload_content') }}" method="POST" enctype="multipart/form-data">
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Resource Title</label>
                <input type="text" name="title" placeholder="e.g., Python Unit 1 Notes" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Select Subject</label>
                <select name="subject_id" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="" disabled selected>-- Choose Subject --</option>
                    {% for sub in subjects %}
                        <option value="{{ sub.id }}">{{ sub.subject_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Content Type</label>
                <select name="resource_type" id="res_type_select" onchange="toggleUploadType()" required 
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="pdf">PDF / Notes</option>
                    <option value="video">Video Lecture (Link)</option>
                </select>
            </div>

            <div id="file_input_div" class="form-group" style="margin-bottom: 15px;">
                <label>Choose PDF File</label>
                <input type="file" name="file_upload" id="file_upload" accept=".pdf" 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div id="url_input_div" class="form-group" style="margin-bottom: 25px;">
                <label id="url_label">Or Paste Drive Link</label>
                <input type="url" name="file_url" id="file_url" placeholder="https://..." 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Upload Content</button>
        </form>
    </div>
</div>

<script>
function toggleUploadType() {
    var type = document.getElementById('res_type_select').value;
    var fileDiv = document.getElementById('file_input_div');
    var urlLabel = document.getElementById('url_label');
    var fileInput = document.getElementById('file_upload');
    var urlInput = document.getElementById('file_url');

    if (type === 'video') {
        fileDiv.style.display = 'none'; 
        fileInput.required = false; // Video ke liye file zaroori nahi
        urlInput.required = true;  // Video ke liye link zaroori hai
        urlLabel.innerText = "YouTube Video Link";
    } else {
        fileDiv.style.display = 'block';
        urlInput.required = false; // PDF ke liye file ya link me se ek chalega
        urlLabel.innerText = "Or Paste Drive Link (If not uploading file)";
    }
}
// Run on initial load
toggleUploadType();
</script>
{% endblock %}
