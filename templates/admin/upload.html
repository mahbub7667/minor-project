{% extends "base.html" %}

{% block title %}Upload Content - Admin{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
    <aside class="sidebar admin-sidebar">
        </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <h2>Upload <span>New Resource</span></h2>
            <p>Add PDF notes, Video links or Quiz details here.</p>
        </header>

        <div class="auth-card" style="max-width: 800px;">
            <form action="#" method="POST" enctype="multipart/form-data" class="auth-form">
                <div class="stats-grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                    
                    <div class="form-group">
                        <label>Select Subject</label>
                        <select name="subject" class="input-wrapper" style="padding: 14px;">
                            <option>Data Structures</option>
                            <option>Operating Systems</option>
                            <option>Software Engineering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Content Type</label>
                        <select name="content_type" id="contentType" class="input-wrapper" style="padding: 14px;">
                            <option value="pdf">PDF Notes</option>
                            <option value="video">Video Lecture (Link)</option>
                            <option value="quiz">Quiz (Future Update)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" class="input-wrapper" placeholder="e.g. Unit 1: Introduction" style="padding: 14px;">
                </div>

                <div id="fileUploadArea" class="form-group">
                    <label>Upload PDF File</label>
                    <input type="file" name="pdf_file" class="input-wrapper" style="padding: 10px;">
                </div>

                <div id="linkUploadArea" class="form-group" style="display: none;">
                    <label>Video URL (YouTube/Drive)</label>
                    <input type="url" name="video_url" class="input-wrapper" placeholder="https://youtube.com/..." style="padding: 14px;">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Publish Resource</button>
            </form>
        </div>
    </main>
</div>

<script>
    // Simple logic to toggle between File and Link
    document.getElementById('contentType').addEventListener('change', function() {
        const fileArea = document.getElementById('fileUploadArea');
        const linkArea = document.getElementById('linkUploadArea');
        
        if (this.value === 'video') {
            fileArea.style.display = 'none';
            linkArea.style.display = 'block';
        } else {
            fileArea.style.display = 'block';
            linkArea.style.display = 'none';
        }
    });
</script>
{% endblock %}
